version: "3.8"

services:
  adobe2api:
    build: .
    container_name: adobe2api
    ports:
      - "6001:6001"
    environment:
      - TZ=Asia/Shanghai
      - PORT=6001
      - ADOBE_API_KEY=clio-playground-web
    volumes:
      # 持久化生成数据
      - ./data:/app/data
      # 持久化配置数据
      - ./config:/app/config
    restart: unless-stopped

  # Optional: enable this with `docker compose --profile flaresolverr up -d`
  # Then set FlareSolverr URL in the admin panel to http://flaresolverr:8191/v1
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: adobe2api-flaresolverr
    profiles:
      - flaresolverr
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=info
    ports:
      - "8191:8191"
    restart: unless-stopped
